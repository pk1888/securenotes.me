version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      - APP_URL=${APP_URL}
    volumes:
      # Persistent storage for encrypted SQLite database
      # In Coolify, map this to a persistent storage volume
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
